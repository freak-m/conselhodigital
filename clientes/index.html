<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Demos de Clientes | Conselho Digital</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100%;font-family:'Inter',system-ui,sans-serif;background:#0b0e14;color:#e2e8f0}
body{display:flex;flex-direction:column;align-items:center;padding:48px 20px}

header{text-align:center;margin-bottom:48px}
.logo{font-size:13px;font-weight:700;color:#3b82f6;letter-spacing:1px;text-transform:uppercase;margin-bottom:16px}
h1{font-size:28px;font-weight:700;color:#f1f5f9;margin-bottom:8px}
.sub{font-size:14px;color:#64748b;max-width:420px;line-height:1.6}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;width:100%;max-width:900px}

.card{display:block;text-decoration:none;background:#111622;border:1px solid #1e2a40;border-radius:12px;overflow:hidden;transition:all .2s}
.card:hover{border-color:#3b82f6;transform:translateY(-2px);box-shadow:0 8px 24px rgba(59,130,246,.12)}
.card-thumb{width:100%;aspect-ratio:16/9;background:#0d1220;display:flex;align-items:center;justify-content:center;font-size:36px;color:#1e2a40;overflow:hidden}
.card-thumb img{width:100%;height:100%;object-fit:cover}
.card-body{padding:14px 16px}
.card-cat{font-size:10px;font-weight:600;color:#3b82f6;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.card-name{font-size:15px;font-weight:600;color:#f1f5f9;margin-bottom:3px}
.card-city{font-size:12px;color:#64748b}

.empty{text-align:center;color:#334155;font-size:13px;padding:40px;border:1px dashed #1e2a40;border-radius:12px;width:100%;max-width:900px}
.empty-icon{font-size:32px;margin-bottom:12px;opacity:.4}
</style>
</head>
<body>

<header>
  <div class="logo">Conselho Digital</div>
  <h1>Demos para Clientes</h1>
  <p class="sub">Exemplos de landing pages criadas para apresentar a novos clientes.</p>
</header>

<div class="grid" id="grid">
  <!-- cards adicionados aqui -->
</div>

<div class="empty" id="empty" style="display:none">
  <div class="empty-icon">🗂️</div>
  Nenhuma demo cadastrada ainda.
</div>

<script>
const demos = [
  // { name: 'Panela de Barro', cat: 'Restaurante', city: 'Campinas', path: 'panela-de-barro/' },
];

const grid  = document.getElementById('grid');
const empty = document.getElementById('empty');

if (!demos.length) {
  grid.style.display = 'none';
  empty.style.display = '';
} else {
  demos.forEach(d => {
    const a = document.createElement('a');
    a.href = d.path;
    a.className = 'card';
    a.innerHTML = `
      <div class="card-thumb">${d.thumb ? `<img src="${d.path}${d.thumb}" alt="${d.name}">` : '🌐'}</div>
      <div class="card-body">
        <div class="card-cat">${d.cat}</div>
        <div class="card-name">${d.name}</div>
        <div class="card-city">${d.city}</div>
      </div>`;
    grid.appendChild(a);
  });
}
</script>
</body>
</html>
